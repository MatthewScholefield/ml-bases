name: Build and Push

on:
  push:
    branches: [main]
    paths: ['images/**']
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          IMAGES=$(ls -d images/*/ | xargs -n1 basename | jq -R -s -c 'split("\n")[:-1]')
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./images/${{ matrix.image }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-${{ matrix.image }}:${{ github.sha }}
